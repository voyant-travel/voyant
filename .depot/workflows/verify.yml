name: verify-ui-extensions
on: workflow_dispatch
jobs:
  verify:
    name: Framework verify (lint, typecheck, test, architecture)
    runs-on: depot-ubuntu-24.04-16
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: NODE_OPTIONS=--max-old-space-size=12288 pnpm turbo run typecheck --continue --concurrency=1 --filter=!./starters/operator --filter=!@voyant-travel/framework --ui=stream --log-order=stream
      - run: pnpm turbo run typecheck --concurrency=1 --filter=@voyant-travel/framework --filter=./starters/operator --ui=stream --log-order=stream
      - run: pnpm turbo run test --continue --ui=stream --log-order=stream
      - run: pnpm verify:architecture
      - run: pnpm verify:package-exports
