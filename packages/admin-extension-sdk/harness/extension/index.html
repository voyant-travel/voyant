<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Acme Reviews — demo extension</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }
      body {
        margin: 0;
        padding: 16px;
        color: #0f172a;
        background: #f8fafc;
      }
      h1 {
        margin: 0 0 4px;
        font-size: 18px;
      }
      .status {
        margin: 0 0 12px;
        color: #475569;
        font-size: 12px;
      }
      code {
        background: #e2e8f0;
        padding: 1px 5px;
        border-radius: 4px;
      }
      .grid {
        display: grid;
        gap: 6px;
        margin-bottom: 14px;
      }
      .row {
        display: flex;
        gap: 8px;
        font-size: 13px;
      }
      .key {
        width: 64px;
        color: #64748b;
      }
      .val {
        font-weight: 600;
      }
      .actions {
        display: flex;
        gap: 8px;
      }
      button {
        border: 1px solid #cbd5e1;
        background: #fff;
        border-radius: 6px;
        padding: 6px 10px;
        font-size: 13px;
        cursor: pointer;
      }
      button:hover {
        background: #f1f5f9;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="./extension.js"></script>
  </body>
</html>
