version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      npm-security-and-maintenance:
        patterns:
          - "*"
        # Keep majors out of the grouped PR entirely — any major (for any dep)
        # gets its own isolated PR instead of breaking the security group.
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Additionally suppress the noisy individual major PRs for deps with known
      # breaking changes that need manual code migration. Per GitHub docs,
      # `update-types` ignore conditions affect version updates only, NOT
      # security updates — a major required to fix an advisory still comes
      # through. Remove an entry when its migration is scheduled.
      - dependency-name: "react-resizable-panels" # v4 dropped PanelGroup/PanelResizeHandle named exports
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-day-picker" # v10 changed the ClassNames type
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node" # major bumps break node: builtins typing here
        update-types: ["version-update:semver-major"]
      - dependency-name: "@manypkg/get-packages" # pinned to @changesets/config's range (^1.1.3); v2+ changed the Packages shape and breaks read()
        update-types: ["version-update:semver-major"]
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
    open-pull-requests-limit: 5
