name: Agent work request
description: Propose work that may become suitable for an agent after maintainer review.
title: "[Task]: "
labels:
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Use this form for work that might later be delegated to an agent.
        Submitting this issue does not spend agent budget or mark it ready.
        A maintainer must approve it before execution.
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Task
        - Bug
        - Refactor
        - Investigation
        - Cleanup
    validations:
      required: true
  - type: textarea
    id: current-behavior
    attributes:
      label: Current behavior
      description: What happens now? For bugs, include the observed failure.
    validations:
      required: true
  - type: textarea
    id: desired-behavior
    attributes:
      label: Desired behavior
      description: What should be true after this work is done?
    validations:
      required: true
  - type: textarea
    id: repro-or-evidence
    attributes:
      label: Reproduction steps or evidence
      description: Include steps, screenshots, videos, logs, or links where relevant.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Concrete checks that prove the work is complete.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: false
  - type: textarea
    id: scope
    attributes:
      label: Scope boundaries
      description: What should not be changed as part of this task?
    validations:
      required: false
  - type: dropdown
    id: security
    attributes:
      label: Security sensitivity
      description: Pick the highest applicable level.
      options:
        - Not security-sensitive
        - Sensitive
        - Needs security review
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      description: Mention related issues, docs, dependencies, or constraints.
    validations:
      required: false
