name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_assets:
        description: "Create or refresh starter assets for an explicit starter release version"
        required: false
        default: false
        type: boolean
      release_version:
        description: "Starter release version to tag and attach assets to, for example 0.104.1"
        required: false
        default: ""
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-assets:
    if: github.event_name == 'workflow_dispatch' && inputs.release_assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      HUSKY: 0
      RELEASE_VERSION: ${{ inputs.release_version }}
      # Release jobs stay on GitHub-hosted runners, so they do not receive
      # Depot's automatic Turborepo cache configuration. Configure all three in
      # GitHub Settings → Secrets and variables → Actions.
      TURBO_API: ${{ vars.TURBO_API }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Validate starter release version
        run: |
          if [ -z "$RELEASE_VERSION" ]; then
            echo "release_version is required when release_assets is true"
            exit 1
          fi

          if ! printf '%s' "$RELEASE_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?(\+[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$'; then
            echo "release_version must be a semver version, for example 0.104.1"
            exit 1
          fi

      - name: Package starter archives
        run: pnpm package:starters -- --version "$RELEASE_VERSION" --out-dir .release/starters

      - name: Ensure repo tag exists
        run: |
          if git rev-parse -q --verify "refs/tags/v$RELEASE_VERSION" >/dev/null; then
            echo "Tag v$RELEASE_VERSION already exists"
          else
            git tag "v$RELEASE_VERSION"
            git push origin "v$RELEASE_VERSION"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: v${{ inputs.release_version }}
          name: v${{ inputs.release_version }}
          generate_release_notes: true
          files: .release/starters/*.tar.gz

  release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    env:
      HUSKY: 0
      # Large declaration builds such as bookings-react exceed Node's 4 GB default heap.
      # Turbo is serialized below, so one build may safely use the runner's available memory.
      NODE_OPTIONS: --max-old-space-size=12288
      # Release jobs stay on GitHub-hosted runners, so they do not receive
      # Depot's automatic Turborepo cache configuration. Configure all three in
      # GitHub Settings → Secrets and variables → Actions.
      TURBO_API: ${{ vars.TURBO_API }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify release config
        run: pnpm verify:release-config

      - name: Plan release work
        id: release_plan
        run: pnpm release:plan

      # Version bumps can invalidate most workspace build caches. Serialize the
      # release build to stay within the runner's memory limit.
      - name: Build pending publish workspaces
        if: steps.release_plan.outputs.publish_pending == 'true'
        run: pnpm turbo build ${{ steps.release_plan.outputs.turbo_filters }} --continue --concurrency=1

      - name: Verify package exports
        if: steps.release_plan.outputs.publish_pending == 'true'
        run: pnpm verify:package-exports ${{ steps.release_plan.outputs.package_filters }}

      - name: Verify before publish
        if: steps.release_plan.outputs.publish_pending == 'true'
        run: pnpm verify:fast

      - name: Verify publish tarballs
        if: steps.release_plan.outputs.publish_pending == 'true'
        # `Build pending publish workspaces` above already produced fresh dist
        # via turbo; skip the per-package clean+rebuild inside the verifier.
        env:
          VOYANT_PACK_REUSE_DIST: "1"
        run: pnpm verify:publish-tarballs ${{ steps.release_plan.outputs.package_filters }}

      - name: Publish pending packages
        id: publish_pending
        if: steps.release_plan.outputs.publish_pending == 'true'
        # Hard outer bound so a stalled publish can never burn a full job slot.
        timeout-minutes: 50
        env:
          # changesets 2.31 publishes up to 10 packages concurrently. Several
          # packages `clean` their dist in prepack (`pnpm run clean && tsc`),
          # so a concurrent republish of a dependency (e.g. `@voyant-travel/admin`)
          # can delete its `dist` while a dependent's prepack `tsc` is resolving
          # it, failing with "Cannot find module '@voyant-travel/admin'". The
          # "Build pending publish workspaces" (Turbo) and "Verify publish
          # tarballs" steps already produced and validated fresh `dist`, so
          # publish must consume those artifacts immutably rather than rebuild
          # them under fan-out. Disabling lifecycle scripts skips the racy
          # prepack rebuild entirely.
          npm_config_ignore_scripts: "true"
        run: |
          # `pnpm release` is `changeset publish`, which is idempotent: it
          # checks npm per package and skips versions already published, so it
          # only ever publishes the still-pending remainder. A single `npm
          # publish` stalling on the registry / OIDC trusted-publishing /
          # sigstore-provenance call would otherwise hang the whole batch with
          # no output until the job is killed (observed: ~6 min of silence,
          # nothing published past the stall). Time-box each attempt and retry
          # the remainder so a transient hang self-heals instead of wedging.
          set -uo pipefail
          attempt=0
          max_attempts=2
          per_attempt_timeout=1200 # seconds (20 min) — a large release publishing many
          # big packages (with sigstore provenance) can legitimately exceed the old
          # 7-min bound; a real single-package stall still fails within the outer job cap.
          while :; do
            attempt=$((attempt + 1))
            echo "::group::changeset publish — attempt ${attempt}/${max_attempts}"
            if timeout "${per_attempt_timeout}" pnpm release; then
              echo "::endgroup::"
              echo "published=true" >> "$GITHUB_OUTPUT"
              exit 0
            else
              status=$?
            fi
            echo "::endgroup::"
            if [ "${status}" -eq 124 ]; then
              echo "::warning::publish attempt ${attempt} timed out after ${per_attempt_timeout}s (likely a stalled npm/OIDC publish)"
            else
              echo "::warning::publish attempt ${attempt} exited ${status}"
            fi
            if [ "${attempt}" -ge "${max_attempts}" ]; then
              echo "::error::publish failed after ${max_attempts} attempts"
              exit 1
            fi
            echo "retrying remaining (still-unpublished) packages in 20s…"
            sleep 20
          done

      - name: Create or update Release PR
        id: changesets
        if: steps.release_plan.outputs.has_releasable_changesets == 'true'
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          createGithubReleases: false
          # Avoid GitHub's intermittent server-side `commit_refs` failures when
          # the action force-pushes `changeset-release/main` via the Git CLI.
          # The API mode creates the same version commit/PR through GitHub's
          # refs API instead of `git push origin HEAD:changeset-release/main`.
          commitMode: github-api
          version: pnpm version-packages
          commit: "chore: release packages"
          title: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: No release action needed
        if: steps.release_plan.outputs.has_releasable_changesets != 'true' && steps.release_plan.outputs.pending != 'true'
        run: echo "No releasable changesets and npm is already up to date."
