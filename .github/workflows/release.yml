name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_assets:
        description: "Create or refresh starter assets for an explicit starter release version"
        required: false
        default: false
        type: boolean
      release_version:
        description: "Starter release version to tag and attach assets to, for example 0.104.1"
        required: false
        default: ""
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-assets:
    if: github.event_name == 'workflow_dispatch' && inputs.release_assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      HUSKY: 0
      RELEASE_VERSION: ${{ inputs.release_version }}
      # Turbo remote cache. Configure in GitHub Settings → Secrets and variables
      # → Actions; without them turbo silently falls back to no remote cache.
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Validate starter release version
        run: |
          if [ -z "$RELEASE_VERSION" ]; then
            echo "release_version is required when release_assets is true"
            exit 1
          fi

          if ! printf '%s' "$RELEASE_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?(\+[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$'; then
            echo "release_version must be a semver version, for example 0.104.1"
            exit 1
          fi

      - name: Package starter archives
        run: pnpm package:starters -- --version "$RELEASE_VERSION" --out-dir .release/starters

      - name: Ensure repo tag exists
        run: |
          if git rev-parse -q --verify "refs/tags/v$RELEASE_VERSION" >/dev/null; then
            echo "Tag v$RELEASE_VERSION already exists"
          else
            git tag "v$RELEASE_VERSION"
            git push origin "v$RELEASE_VERSION"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.release_version }}
          name: v${{ inputs.release_version }}
          generate_release_notes: true
          files: .release/starters/*.tar.gz

  release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    env:
      HUSKY: 0
      # Turbo remote cache. Configure in GitHub Settings → Secrets and variables
      # → Actions; without them turbo silently falls back to no remote cache.
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify release config
        run: pnpm verify:release-config

      - name: Plan release work
        id: release_plan
        run: pnpm release:plan

      # `--concurrency=4` caps peak parallelism so a cold-cache cascade rebuild
      # can't OOM the runner (kernel SIGKILLs the heaviest tsc — exit 137).
      - name: Build pending publish workspaces
        if: steps.release_plan.outputs.pending == 'true'
        run: pnpm turbo build ${{ steps.release_plan.outputs.turbo_filters }} --continue --concurrency=4

      - name: Build registry artifacts
        if: steps.release_plan.outputs.pending == 'true' && steps.release_plan.outputs.registry_build_needed == 'true'
        run: pnpm registry:build

      - name: Verify package exports
        if: steps.release_plan.outputs.pending == 'true'
        run: pnpm verify:package-exports ${{ steps.release_plan.outputs.package_filters }}

      - name: Verify publish tarballs
        if: steps.release_plan.outputs.pending == 'true'
        # `Build pending publish workspaces` above already produced fresh dist
        # via turbo; skip the per-package clean+rebuild inside the verifier.
        env:
          VOYANT_PACK_REUSE_DIST: "1"
        run: pnpm verify:publish-tarballs ${{ steps.release_plan.outputs.package_filters }}

      - name: Publish pending packages
        id: publish_pending
        if: steps.release_plan.outputs.pending == 'true'
        run: |
          pnpm release
          echo "published=true" >> "$GITHUB_OUTPUT"

      - name: Create or update Release PR
        id: changesets
        if: steps.release_plan.outputs.has_releasable_changesets == 'true'
        uses: changesets/action@v1
        with:
          createGithubReleases: false
          version: pnpm version-packages
          commit: "chore: release packages"
          title: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: No release action needed
        if: steps.release_plan.outputs.has_releasable_changesets != 'true' && steps.release_plan.outputs.pending != 'true'
        run: echo "No releasable changesets and npm is already up to date."
