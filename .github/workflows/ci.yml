name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

# Cancel in-flight runs only for PR pushes (`pull_request` events). Pushes to
# main/develop always run to completion: each merged commit is a state we may
# need to bisect or reproduce later, and the changesets-bot's "chore: release
# packages" auto-merge pattern lands a follow-up commit within seconds — under
# the previous `cancel-in-progress: true` rule that follow-up reliably
# cancelled the bot commit's CI before it could finish, leaving a red X on
# main with no useful signal. Splitting the group by event keeps PR-side
# cancellation (still useful — when you push to a PR, the previous run is
# obsolete) while letting push-side runs complete.
concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

# Two jobs run in parallel. `checks` covers everything that only needs source
# (lint/typecheck/test/architecture/i18n); `build` covers everything that
# needs fresh dist (turbo build → package exports → publish tarballs). They
# share the same setup; both rely on the pnpm + turbo remote caches to make
# the duplicated install/build effectively free on warm caches.
#
# NOTE: branch protection rules need to require `CI / checks`, `CI / build`,
# `CI / db-checks`, and `CI / node-smoke` (the previous single `verify` job no
# longer exists). `db-checks` is the migration safety gate — it must be a
# REQUIRED check, or the replay-parity oracle silently provides no protection.
# `node-smoke` gates the first-class Node deployment target (voyant#2966).

jobs:
  checks:
    name: checks
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
      NODE_OPTIONS: --max-old-space-size=12288
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      # Typecheck is split so the heavy COMPOSITION POINTS each get the runner to
      # themselves. As @hono/zod-openapi adoption grows the admin surface, three
      # tsc programs balloon: the operator app, the @voyant-travel/openapi spec
      # package, and the @voyant-travel/framework composition. Each now needs
      # >8 GB and would either blow its own heap (exit 134) or, run concurrently,
      # oversubscribe the 16 GB runner and get OOM-killed (exit 137). So the
      # packages fan out below, then the three heavy programs run one-at-a-time
      # (concurrency=1), each alone with its own package-script heap.
      #
      # `typecheck` dependsOn `^build`, so this also executes the same multi-gigabyte
      # *-react and aggregator builds as the Build job. Keep it serial so only one
      # process can use the 12 GB heap allowance on the 16 GB runner.
      - name: Typecheck (packages)
        run: NODE_OPTIONS=--max-old-space-size=12288 pnpm turbo run typecheck --continue --concurrency=1 --filter=!./starters/operator --filter=!@voyant-travel/openapi --filter=!@voyant-travel/framework --ui=stream --log-order=stream

      - name: Typecheck (composition points)
        # Serial (concurrency=1): operator app, openapi spec, framework composition
        # each run alone with the full runner + their own heap (see each package's
        # package.json). Deps are cached from the step above, so only these three
        # programs run live here.
        run: pnpm turbo run typecheck --concurrency=1 --filter=@voyant-travel/framework --filter=@voyant-travel/openapi --filter=./starters/operator --ui=stream --log-order=stream

      - name: Test
        run: pnpm turbo run test --continue --ui=stream --log-order=stream

      - name: Architecture checks
        run: pnpm verify:architecture

      - name: Migration drift check (operator)
        # Fails the build if the operator starter's generated managed profile
        # drifts from the installed framework or resolved deployment graph.
        #
        # Runs through the operator workspace's own @voyant-travel/cli devDependency
        # (a public package, already installed) — no extra root dependency.
        env:
          NODE_OPTIONS: --conditions=development --max-old-space-size=8192
        working-directory: starters/operator
        run: |
          pnpm exec voyant build --json
          pnpm exec voyant db doctor --fail-on-drift

      - name: i18n checks
        run: pnpm i18n:check

  build:
    name: build
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
      # The composed framework app's tsc build grows with each module's
      # OpenAPIHono route chain; match the heap the typecheck/db-checks jobs
      # already use. Serial execution keeps this 12 GB process inside runner RAM.
      NODE_OPTIONS: --max-old-space-size=12288
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build the @voyant-travel/framework composition first, alone. Its `tsc -p`
      # grows with every module's OpenAPIHono route chain and now needs >8 GB
      # (exit 134 at the job's default heap); running it with the full runner +
      # its own package-script heap avoids that, and because it's a root dep the
      # rest of the graph would wait on it anyway. The second step reuses its
      # cached dist, so only the remaining packages build there.
      - name: Build (framework composition)
        # --filter builds framework AND its whole upstream dep graph; cap at
        # concurrency=1 because a cold cache can overlap multiple multi-gigabyte
        # TypeScript builds even inside this dependency slice and exhaust the
        # 16 GB runner. Framework's own build keeps its package-script heap.
        run: pnpm turbo build --filter=@voyant-travel/framework --concurrency=1 --ui=stream --log-order=stream

      - name: Build
        # Keep this serial as well: bookings-react alone can approach the 8 GB
        # package heap, so any concurrent TypeScript build can exceed runner RAM.
        # Framework already built in the preceding step and should hit cache.
        run: pnpm turbo build --concurrency=1 --ui=stream --log-order=stream

      - name: Package export checks
        run: pnpm verify:package-exports

      - name: Publish tarball checks
        # The preceding `Build` step already produced fresh dist via turbo
        # (with remote cache); reuse it instead of clean-building each
        # public package a second time inside the verifier.
        env:
          VOYANT_PACK_REUSE_DIST: "1"
        run: pnpm verify:publish-tarballs

  # Migration safety gate (D.1). Everything here needs a real Postgres, so it
  # used to be invisible in CI (the replay oracle and the custom-field route
  # tests skip cleanly when TEST_DATABASE_URL is unset). This job provides the
  # service + env so they actually run on every PR.
  db-checks:
    name: db-checks
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
      # `--conditions=development` makes drizzle-kit load the workspace TS-source
      # schema (this job does NOT build dist, so the default condition resolves
      # to absent dist and push would materialise an EMPTY schema). Mirrors the
      # `checks` job's migration-drift step.
      NODE_OPTIONS: --conditions=development --max-old-space-size=8192
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      # The user is a superuser (CREATEDB) — the replay oracle creates and drops
      # its own throwaway DBs; the integration tests use voyant_test.
      TEST_DATABASE_URL: postgresql://voyant:voyant@localhost:5432/voyant_test
      DATABASE_URL: postgresql://voyant:voyant@localhost:5432/voyant_test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: voyant
          POSTGRES_PASSWORD: voyant
          POSTGRES_DB: voyant_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Replay parity (legacy upgrade == package-owned replay)
        # Proves the frozen cutline + retired deployment history and a fresh
        # replay of selected package migrations produce the same schema.
        run: node scripts/verify-migration-replay-parity.mjs

      - name: D.2 fresh-union (all package migration sources apply together)
        # The fresh-D.2 gate: every per-package migration source applied together
        # (deps-first) must not collide and must reconstitute the bundle
        # column-for-column. Catches duplicate shared enums / missing extensions /
        # ownerless tables before they ship. Creates/drops its own throwaway DBs.
        run: node scripts/migrations/verify-package-baseline.mjs --union

      - name: Materialize the selected package schema
        # Exercise the same graph-derived package migration runner used by Node
        # deployments before running integration tests against the real schema.
        run: pnpm --filter operator db:migrate

      - name: Custom-field integration tests
        run: >-
          pnpm --filter @voyant-travel/relationships exec vitest run
          tests/integration/custom-fields.test.ts
          tests/integration/custom-fields-values.test.ts

  # Gates the first-class production target (voyant#2966): the operator must
  # build and boot under Node, serve `/healthz`, and dispatch the API. Node is
  # the recommended operator deployment, so a regression that breaks the Node
  # boot should fail CI rather than surface at deploy time.
  node-smoke:
    name: node-smoke
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
      NODE_OPTIONS: --max-old-space-size=12288
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build operator (Node target)
        # Only the operator is built — its Vite config bundles the workspace
        # packages from SOURCE (the `development` resolve condition), so the
        # dependency graph does not need to be prebuilt (same as the Dockerfile).
        run: pnpm --filter operator build

      - name: Boot under Node and smoke-test
        # Boot `dist/server/server.js` (the createNodeServer entry), then assert
        # /healthz is 200 and the API dispatches (a non-5xx status — 401 is the
        # expected auth rejection for the protected openapi route). No database is
        # needed: /healthz is served before app.fetch, and the openapi route is
        # rejected at the auth middleware before any DB access. Throwaway secrets
        # are generated at runtime (never committed) so the secret scanner has
        # nothing to flag.
        working-directory: starters/operator
        env:
          PORT: "8080"
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          EMAIL_FROM: ci@example.com
          KMS_PROVIDER: local
          APP_URL: http://localhost:8080/api
          API_BASE_URL: http://localhost:8080/api
          CORS_ALLOWLIST: http://localhost:8080
          DASH_BASE_URL: http://localhost:8080
        run: |
          export BETTER_AUTH_SECRET="$(openssl rand -hex 24)"
          export SESSION_CLAIMS_SECRET="$(openssl rand -hex 24)"
          export INTERNAL_API_KEY="$(openssl rand -hex 16)"
          export KMS_LOCAL_KEY="$(openssl rand -hex 16)"
          node dist/server/server.js &
          SRV=$!
          trap 'kill $SRV 2>/dev/null || true' EXIT
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null http://localhost:8080/healthz; then break; fi
            sleep 1
          done
          health=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/healthz)
          echo "healthz -> $health"
          test "$health" = "200"
          api=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 http://localhost:8080/api/openapi.json)
          echo "api dispatch -> $api"
          test "$api" -lt 500

      - name: Packaged starter acceptance evidence
        # Reuse the build above for bounded server/admin/boot metrics, then run one
        # serialized packaged-starter install, graph emission, convention scan,
        # and generic Node probe. This does not launch a second repository build.
        run: |
          node scripts/measure-standard-node-starter.mjs --require-build --check
          node --test scripts/tests/minimal-starter-acceptance.test.mjs
