name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

# Cancel in-flight runs only for PR pushes (`pull_request` events). Pushes to
# main/develop always run to completion: each merged commit is a state we may
# need to bisect or reproduce later, and the changesets-bot's "chore: release
# packages" auto-merge pattern lands a follow-up commit within seconds — under
# the previous `cancel-in-progress: true` rule that follow-up reliably
# cancelled the bot commit's CI before it could finish, leaving a red X on
# main with no useful signal. Splitting the group by event keeps PR-side
# cancellation (still useful — when you push to a PR, the previous run is
# obsolete) while letting push-side runs complete.
concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

# Two jobs run in parallel. `checks` covers everything that only needs source
# (lint/typecheck/test/architecture/i18n); `build` covers everything that
# needs fresh dist (turbo build → package exports → publish tarballs). They
# share the same setup; both rely on the pnpm + turbo remote caches to make
# the duplicated install/build effectively free on warm caches.
#
# NOTE: branch protection rules need to require `CI / checks`, `CI / build`,
# and `CI / db-checks` (the previous single `verify` job no longer exists).
# `db-checks` is the migration safety gate — it must be a REQUIRED check, or the
# replay-parity oracle silently provides no protection.

jobs:
  checks:
    name: checks
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
      NODE_OPTIONS: --max-old-space-size=8192
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      # Typecheck is split so the heavy COMPOSITION POINTS each get the runner to
      # themselves. As @hono/zod-openapi adoption grows the admin surface, three
      # tsc programs balloon: the operator app, the @voyant-travel/openapi spec
      # package, and the @voyant-travel/framework composition. Each now needs
      # >8 GB and would either blow its own heap (exit 134) or, run concurrently,
      # oversubscribe the 16 GB runner and get OOM-killed (exit 137). So the
      # packages fan out below, then the three heavy programs run one-at-a-time
      # (concurrency=1), each alone with its own package-script heap.
      #
      # concurrency=2 (NOT core-count / 4): `typecheck` dependsOn `^build`, so this
      # step also builds the heavy *-react and aggregator packages. With the 8 GB
      # per-process ceiling, >2 coincident heavy builds exceed the 16 GB runner and
      # get OOM-killed (exit 137 → "operation was canceled", no `error TS`). This is
      # the same coincident-heavy-build OOM that pinned the Build step to 2; the
      # ^build deps are the same programs, so this step matches that safe ceiling.
      - name: Typecheck (packages)
        run: NODE_OPTIONS=--max-old-space-size=8192 pnpm turbo run typecheck --continue --concurrency=2 --filter=!./starters/operator --filter=!@voyant-travel/openapi --filter=!@voyant-travel/framework --ui=stream --log-order=stream

      - name: Typecheck (composition points)
        # Serial (concurrency=1): operator app, openapi spec, framework composition
        # each run alone with the full runner + their own heap (see each package's
        # package.json). Deps are cached from the step above, so only these three
        # programs run live here.
        run: pnpm turbo run typecheck --concurrency=1 --filter=@voyant-travel/framework --filter=@voyant-travel/openapi --filter=./starters/operator --ui=stream --log-order=stream

      - name: Test
        run: pnpm turbo run test --continue --ui=stream --log-order=stream

      - name: Architecture checks
        run: pnpm verify:architecture

      - name: Migration drift check (operator)
        # Fails the build if the operator starter's migrations drift from its
        # voyant.config manifest: missing/extra schemas, a stale generated
        # manifest, a new duplicate migration prefix (vs the baseline), or a
        # link table missing from the latest Drizzle snapshot. See
        # docs/architecture/schema-discipline.md and voyant#1608.
        #
        # Runs through the operator workspace's own @voyant-travel/cli devDependency
        # (a public package, already installed) — no extra root dependency.
        env:
          NODE_OPTIONS: --conditions=development --max-old-space-size=8192
        run: pnpm --filter operator exec voyant db doctor --fail-on-drift

      - name: i18n checks
        run: pnpm i18n:check

  build:
    name: build
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
      # The composed framework app's tsc build grows with each module's
      # OpenAPIHono route chain; match the heap the typecheck/db-checks jobs
      # already use so `tsc -p` doesn't OOM at the default ~4GB (voyant#2114).
      NODE_OPTIONS: --max-old-space-size=8192
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build the @voyant-travel/framework composition first, alone. Its `tsc -p`
      # grows with every module's OpenAPIHono route chain and now needs >8 GB
      # (exit 134 at the job's default heap); running it with the full runner +
      # its own package-script heap avoids that, and because it's a root dep the
      # rest of the graph would wait on it anyway. The second step reuses its
      # cached dist, so only the remaining packages build there.
      - name: Build (framework composition)
        # --filter builds framework AND its whole upstream dep graph; cap at
        # concurrency=2 so a cold cache (e.g. right after a turbo-hash-invalidating
        # change) can't coincide several heavy module builds and OOM the 16 GB
        # runner (exit 137). framework's own build keeps its package-script heap.
        run: pnpm turbo build --filter=@voyant-travel/framework --concurrency=2 --ui=stream --log-order=stream

      - name: Build
        # concurrency=2: the framework dist grows with every admin route batch,
        # which makes the downstream *-react / app builds heavier; at turbo's
        # default (core-count) concurrency several heavy builds coincided and the
        # OOM-killer SIGKILLed one (exit 137) on the 16 GB runner. Two-at-a-time
        # keeps aggregate build RAM in budget. (Framework already built alone above.)
        run: pnpm turbo build --concurrency=2 --ui=stream --log-order=stream

      - name: Package export checks
        run: pnpm verify:package-exports

      - name: Publish tarball checks
        # The preceding `Build` step already produced fresh dist via turbo
        # (with remote cache); reuse it instead of clean-building each
        # public package a second time inside the verifier.
        env:
          VOYANT_PACK_REUSE_DIST: "1"
        run: pnpm verify:publish-tarballs

  # Migration safety gate (D.1). Everything here needs a real Postgres, so it
  # used to be invisible in CI (the replay oracle and the custom-field route
  # tests skip cleanly when TEST_DATABASE_URL is unset). This job provides the
  # service + env so they actually run on every PR.
  db-checks:
    name: db-checks
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
      # `--conditions=development` makes drizzle-kit load the workspace TS-source
      # schema (this job does NOT build dist, so the default condition resolves
      # to absent dist and push would materialise an EMPTY schema). Mirrors the
      # `checks` job's migration-drift step.
      NODE_OPTIONS: --conditions=development --max-old-space-size=8192
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      # The user is a superuser (CREATEDB) — the replay oracle creates and drops
      # its own throwaway DBs; the integration tests use voyant_test.
      TEST_DATABASE_URL: postgresql://voyant:voyant@localhost:5432/voyant_test
      DATABASE_URL: postgresql://voyant:voyant@localhost:5432/voyant_test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: voyant
          POSTGRES_PASSWORD: voyant
          POSTGRES_DB: voyant_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Replay-parity oracle (bundle + links == live aggregate schema)
        # Proves the framework bundle + deployment links reconstitute EXACTLY the
        # drizzle-kit-push of the live aggregate schema (the baseline cutover's
        # safety oracle). Creates/drops its own throwaway DBs.
        run: node scripts/verify-migration-replay-parity.mjs

      - name: D.2 fresh-union (all package migration sources apply together)
        # The fresh-D.2 gate: every per-package migration source applied together
        # (deps-first) must not collide and must reconstitute the bundle
        # column-for-column. Catches duplicate shared enums / missing extensions /
        # ownerless tables before they ship. Creates/drops its own throwaway DBs.
        run: node scripts/migrations/verify-package-baseline.mjs --union

      - name: Materialize the aggregate schema (drizzle-kit push)
        # The custom-field integration route tests run against a real schema.
        # Trigram indexes need pg_trgm/unaccent seeded before push.
        run: |
          psql "$DATABASE_URL" -c 'CREATE EXTENSION IF NOT EXISTS "pg_trgm"; CREATE EXTENSION IF NOT EXISTS "unaccent";'
          pnpm --filter operator exec drizzle-kit push --force

      - name: Custom-field integration tests
        run: >-
          pnpm --filter @voyant-travel/relationships exec vitest run
          tests/integration/custom-fields.test.ts
          tests/integration/custom-fields-values.test.ts
