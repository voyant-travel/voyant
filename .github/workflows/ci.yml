name: CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

# Standard GitHub-hosted runners are free and unlimited for this public
# repository. Depot CI remains available as a manual, job-selectable escape
# hatch in `.depot/workflows/ci.yml`.

jobs:
  quality-graph:
    name: quality-graph
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      HUSKY: 0
      NODE_OPTIONS: --max-old-space-size=12288
      TURBO_API: ${{ vars.TURBO_API }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      TURBO_RUN_SUMMARY: "true"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          filter: blob:none

      - uses: ./.github/actions/setup-workspace

      - name: Lint
        run: pnpm lint

      - name: Typecheck changed graph
        shell: bash
        run: |
          args=(--concurrency=2)
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            args+=(--affected)
          fi
          pnpm typecheck:ci "${args[@]}"

      - name: Record Turbo metrics
        if: always()
        run: node scripts/summarize-turbo-runs.mjs

      - name: Upload Turbo run summaries
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: turbo-runs-quality-${{ github.run_attempt }}
          path: .turbo/runs/*.json
          if-no-files-found: ignore
          retention-days: 7

  tests:
    name: tests
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      HUSKY: 0
      NODE_OPTIONS: --max-old-space-size=12288
      TURBO_API: ${{ vars.TURBO_API }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      TURBO_RUN_SUMMARY: "true"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          filter: blob:none

      - uses: ./.github/actions/setup-workspace

      - name: Test changed graph
        shell: bash
        run: |
          args=(--summarize --output-logs=new-only)
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            args+=(--affected)
          fi
          pnpm test "${args[@]}"

      - name: Record Turbo metrics
        if: always()
        run: node scripts/summarize-turbo-runs.mjs

      - name: Upload Turbo run summaries
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: turbo-runs-tests-${{ github.run_attempt }}
          path: .turbo/runs/*.json
          if-no-files-found: ignore
          retention-days: 7

  architecture:
    name: architecture
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      HUSKY: 0
      NODE_OPTIONS: --conditions=development --max-old-space-size=12288
      TURBO_API: ${{ vars.TURBO_API }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          filter: blob:none

      - uses: ./.github/actions/setup-workspace

      - name: Architecture checks
        run: pnpm verify:architecture

      - name: i18n checks
        run: pnpm i18n:check

  checks:
    name: checks
    if: always()
    needs:
      - quality-graph
      - tests
      - architecture
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - name: Enforce all quality lanes
        shell: bash
        run: |
          [[ "${{ needs.quality-graph.result }}" == "success" ]]
          [[ "${{ needs.tests.result }}" == "success" ]]
          [[ "${{ needs.architecture.result }}" == "success" ]]

  build-graph:
    name: build-graph
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    env:
      HUSKY: 0
      NODE_OPTIONS: --max-old-space-size=12288
      TURBO_API: ${{ vars.TURBO_API }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      TURBO_RUN_SUMMARY: "true"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          filter: blob:none

      - uses: ./.github/actions/setup-workspace

      - name: Build
        run: pnpm turbo build --concurrency=2 --summarize --output-logs=new-only

      - name: Record Turbo metrics
        if: always()
        run: node scripts/summarize-turbo-runs.mjs

      - name: Upload Turbo run summaries
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: turbo-runs-build-graph-${{ github.run_attempt }}
          path: .turbo/runs/*.json
          if-no-files-found: ignore
          retention-days: 7

  packaged-acceptance:
    name: packaged-acceptance
    needs: build-graph
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    env:
      HUSKY: 0
      NODE_OPTIONS: --max-old-space-size=12288
      TEST_DATABASE_URL: postgresql://voyant:voyant@localhost:5432/voyant_starter_acceptance
      TURBO_API: ${{ vars.TURBO_API }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: voyant
          POSTGRES_PASSWORD: voyant
          POSTGRES_DB: voyant_starter_acceptance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U voyant -d voyant_starter_acceptance"
          --health-interval 1s
          --health-timeout 1s
          --health-retries 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          filter: blob:none

      - uses: ./.github/actions/setup-workspace

      - name: Install acceptance browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Restore build graph
        run: pnpm turbo build --concurrency=2 --output-logs=new-only

      - name: Packaged starter production and development acceptance
        run: |
          node scripts/measure-standard-node-starter.mjs --require-build --check
          node --test scripts/tests/minimal-starter-acceptance.test.mjs

  package-artifacts:
    name: package-artifacts
    needs: build-graph
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    env:
      HUSKY: 0
      NODE_OPTIONS: --max-old-space-size=12288
      TURBO_API: ${{ vars.TURBO_API }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          filter: blob:none

      - uses: ./.github/actions/setup-workspace

      - name: Restore build graph
        run: pnpm turbo build --concurrency=2 --output-logs=new-only

      - name: Verify package exports
        run: pnpm verify:package-exports

      - name: Verify publish tarballs
        env:
          VOYANT_PACK_REUSE_DIST: "1"
        run: pnpm verify:publish-tarballs

  build:
    name: build
    if: always()
    needs:
      - build-graph
      - packaged-acceptance
      - package-artifacts
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - name: Enforce build and package lanes
        shell: bash
        run: |
          [[ "${{ needs.build-graph.result }}" == "success" ]]
          [[ "${{ needs.packaged-acceptance.result }}" == "success" ]]
          [[ "${{ needs.package-artifacts.result }}" == "success" ]]

  db-lanes:
    name: db-${{ matrix.lane }}
    needs: checks
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: replay
            runner: ubuntu-24.04
          - lane: union
            runner: ubuntu-24.04
          - lane: integration
            runner: ubuntu-24.04
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    env:
      HUSKY: 0
      NODE_OPTIONS: --conditions=development --max-old-space-size=12288
      TURBO_API: ${{ vars.TURBO_API }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      TEST_DATABASE_URL: postgresql://voyant:voyant@localhost:5432/voyant_test
      DATABASE_URL: postgresql://voyant:voyant@localhost:5432/voyant_test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: voyant
          POSTGRES_PASSWORD: voyant
          POSTGRES_DB: voyant_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U voyant -d voyant_test"
          --health-interval 1s
          --health-timeout 1s
          --health-retries 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          filter: blob:none

      - uses: ./.github/actions/setup-workspace

      - name: Run ${{ matrix.lane }} database lane
        shell: bash
        run: |
          case "${{ matrix.lane }}" in
            replay)
              node scripts/verify-migration-replay-parity.mjs
              ;;
            union)
              node scripts/migrations/verify-package-baseline.mjs --union
              ;;
            integration)
              NODE_OPTIONS="--conditions=development --import=tsx --max-old-space-size=8192" \
                pnpm --filter operator db:migrate
              pnpm --filter @voyant-travel/relationships exec vitest run \
                tests/integration/generic-custom-field-values.test.ts
              pnpm --filter @voyant-travel/framework-migrations exec vitest run \
                src/deployment-runner.test.ts
              pnpm --filter @voyant-travel/catalog exec vitest run \
                tests/integration/postgres-indexer.test.ts
              pnpm --filter @voyant-travel/catalog exec vitest run \
                tests/integration/postgres-pgtrgm-indexer.test.ts
              pnpm --filter @voyant-travel/commerce exec vitest run \
                tests/integration/promotion-created-command.test.ts
              ;;
          esac

  db-checks:
    name: db-checks
    if: always()
    needs: db-lanes
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - name: Enforce all database lanes
        run: test "${{ needs.db-lanes.result }}" = "success"

  node-smoke:
    name: node-smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      HUSKY: 0
      NODE_OPTIONS: --conditions=development --max-old-space-size=12288
      TURBO_API: ${{ vars.TURBO_API }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          filter: blob:none

      - uses: ./.github/actions/setup-workspace

      - name: Build operator (Node target)
        run: pnpm --filter operator build

      - name: Boot under Node and smoke-test
        working-directory: starters/operator
        env:
          PORT: "8080"
          DATABASE_URL: postgresql://voyant:voyant@localhost:5432/voyant_starter_acceptance
          EMAIL_FROM: ci@example.com
          KMS_PROVIDER: local
          APP_URL: http://localhost:8080/api
          API_BASE_URL: http://localhost:8080/api
          CORS_ALLOWLIST: http://localhost:8080
          DASH_BASE_URL: http://localhost:8080
        run: |
          export BETTER_AUTH_ADMIN_SECRET="$(openssl rand -hex 24)"
          export BETTER_AUTH_CUSTOMER_SECRET="$(openssl rand -hex 24)"
          export SESSION_CLAIMS_ADMIN_SECRET="$(openssl rand -hex 24)"
          export SESSION_CLAIMS_CUSTOMER_SECRET="$(openssl rand -hex 24)"
          export VOYANT_CHECKOUT_CAPABILITY_SECRET="$(openssl rand -hex 24)"
          export INTERNAL_API_KEY="$(openssl rand -hex 16)"
          export KMS_LOCAL_KEY="$(openssl rand -hex 16)"
          node dist/server/server.js &
          SRV=$!
          trap 'kill $SRV 2>/dev/null || true' EXIT
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null http://localhost:8080/healthz; then break; fi
            sleep 1
          done
          health=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/healthz)
          echo "healthz -> $health"
          test "$health" = "200"
          api=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 http://localhost:8080/api/openapi.json)
          echo "api dispatch -> $api"
          test "$api" -lt 500
