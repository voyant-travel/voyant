name: Agent project intake

on:
  issues:
    types:
      - opened
      - labeled
      - reopened

permissions:
  contents: read
  issues: read

jobs:
  add-agent-ready-issue:
    name: Add agent-ready issue to project
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'agent:ready')
    steps:
      - name: Add issue to Voyant Engineering
        uses: actions/add-to-project@5afcf98fcd03f1c2f92c3c83f58ae24323cc57fd # v2.0.0
        with:
          project-url: ${{ vars.VOYANT_ENGINEERING_PROJECT_URL }}
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
          labeled: agent:ready
          label-operator: OR
