name: Agent project intake

on:
  issues:
    types:
      - opened
      - labeled
      - reopened

permissions:
  contents: read
  issues: read

jobs:
  add-agent-ready-issue:
    name: Add agent-ready issue to project
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'agent:ready')
    steps:
      - name: Add issue to Voyant Engineering
        uses: actions/add-to-project@244f685bbc3b7adfa8466e08b698b5577571133e # v1.0.2
        with:
          project-url: ${{ vars.VOYANT_ENGINEERING_PROJECT_URL }}
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
          labeled: agent:ready
          label-operator: OR
