name: Load Test

# k6 load-test suite (perf assessment Phase 3.5 — scripts/load/README.md).
# Manual / release-triggered only: NO cron. Point target_url at a STAGING
# tenant; payday-spike mutates data and requires allow_writes=true (the
# script additionally refuses to run without ALLOW_WRITES=1).

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Base URL of the staging tenant under test"
        required: true
        type: string
      scenario:
        description: "Which scenario to run"
        required: true
        type: choice
        default: storefront-firehose
        options:
          - storefront-firehose
          - payday-spike
          - mixed
      allow_writes:
        description: "Allow data-mutating scenarios (staging only!)"
        required: false
        type: boolean
        default: false
      product_ids:
        description: "Optional comma-separated product ids (skips discovery)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: load-test-${{ inputs.target_url }}
  cancel-in-progress: false

jobs:
  k6:
    name: k6 ${{ inputs.scenario }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Refuse write scenario without allow_writes
        if: inputs.scenario == 'payday-spike' && !inputs.allow_writes
        run: |
          echo "::error::payday-spike mutates data on the target tenant. Re-run with allow_writes=true against a STAGING tenant only."
          exit 1

      - uses: grafana/setup-k6-action@db07bd9765aac508ef18982e52ab937fe633a065 # v1.2.1

      # k6 exits non-zero on any threshold breach, which fails this step (and
      # the job) — that is the SLO gate. The summary JSON is still written
      # before exit, so the artifact upload below runs on failure too.
      - name: Run k6 scenario
        env:
          TARGET_URL: ${{ inputs.target_url }}
          ALLOW_WRITES: ${{ inputs.allow_writes && '1' || '0' }}
          PRODUCT_IDS: ${{ inputs.product_ids }}
          API_TOKEN: ${{ secrets.LOAD_TEST_API_TOKEN }}
        run: |
          k6 run \
            --summary-export=k6-summary.json \
            "scripts/load/${{ inputs.scenario }}.js"

      - name: Upload summary artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: k6-summary-${{ inputs.scenario }}-${{ github.run_id }}
          path: k6-summary.json
          if-no-files-found: warn
          retention-days: 90
